name: Release Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --extra dev
          npm --prefix frontend ci

      - name: Release precheck
        run: uv run python scripts/release_check.py --skip-final

      - name: Final acceptance
        run: uv run python scripts/final_acceptance.py
