name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync --extra dev
          npm --prefix frontend ci

      - name: Verify release
        run: uv run python scripts/release_check.py --skip-final

      - name: Build update bundle
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          npm --prefix frontend run build
          uv run python scripts/build_release_bundle.py --version "${RELEASE_VERSION#v}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" \
            "dist/open-novel-${RELEASE_TAG#v}.zip" \
            "dist/open-novel-${RELEASE_TAG#v}.zip.sha256" \
            --clobber
